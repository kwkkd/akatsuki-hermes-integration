name: "Full Ransomware Simulation"
objective: "Simulate complete ransomware operation lifecycle"
target_type: "enterprise"
phases:
  - name: initial_access
    stop_on_fail: true
    tools:
      - nmap
      - nuclei
  - name: core_execution
    depends_on: ["initial_access"]
    stop_on_fail: true
    tools:
      - crackmapexec
      - nmap
  - name: exit_monetization
    depends_on: ["core_execution"]
    stop_on_fail: false
    tools: []
