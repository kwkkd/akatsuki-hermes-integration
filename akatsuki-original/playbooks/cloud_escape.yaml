name: "Cloud Environment Escape"
objective: "Cloud environment penetration and container escape"
target_type: "cloud"
phases:
  - name: recon
    stop_on_fail: false
    tools:
      - nmap
  - name: exploit
    depends_on: ["recon"]
    stop_on_fail: false
    tools:
      - nuclei
  - name: post_exploit
    depends_on: ["exploit"]
    stop_on_fail: false
    tools: []
  - name: exit_monetization
    depends_on: ["post_exploit"]
    stop_on_fail: false
    tools: []
